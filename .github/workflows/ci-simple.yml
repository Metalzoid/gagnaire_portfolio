name: CI Simple

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  frontend:
    name: Frontend CI
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install npm 11.10.1
        run: |
          for i in 1 2 3; do
            npm install -g npm@11.10.1 && exit 0
            echo "Tentative $i échouée (403), attente 15s avant retry..."
            sleep 15
          done
          exit 1

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build --workspace=shared

      - name: Lint
        run: npm run lint --workspace=frontend

      - name: TypeScript check
        run: npm run typecheck --workspace=frontend

      - name: Build
        run: npm run build --workspace=frontend

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/.next
          retention-days: 1

  backend:
    name: Backend CI
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
      DATABASE_URL: postgresql://portfolio:portfolio_dev@localhost:5432/portfolio_test_db

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: portfolio
          POSTGRES_PASSWORD: portfolio_dev
          POSTGRES_DB: portfolio_test_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U portfolio -d portfolio_test_db"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install npm 11.10.1
        run: |
          for i in 1 2 3; do
            npm install -g npm@11.10.1 && exit 0
            echo "Tentative $i échouée (403), attente 15s avant retry..."
            sleep 15
          done
          exit 1

      - name: Install dependencies
        run: npm ci

      - name: Build shared
        run: npm run build --workspace=shared

      - name: Generate Prisma client
        working-directory: backend
        run: npx prisma generate

      - name: Apply Prisma migrations
        working-directory: backend
        run: npx prisma migrate deploy

      - name: TypeScript check
        run: npm run typecheck --workspace=backend

      - name: Build backend
        run: npm run build --workspace=backend

      - name: Validate Prisma schema
        working-directory: backend
        run: npx prisma validate

      - name: Run tests
        run: npm run test --workspace=backend
