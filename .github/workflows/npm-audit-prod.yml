name: NPM Audit (Production)

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  audit-prod:
    name: Audit dépendances production
    runs-on: ubuntu-latest
    env:
      NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          registry-url: "https://registry.npmjs.org"

      - name: Install npm 11.10.1
        run: |
          for i in 1 2 3; do
            npm install -g npm@11.10.1 && exit 0
            echo "Tentative $i échouée (403), attente 15s avant retry..."
            sleep 15
          done
          exit 1

      - name: Install dependencies
        run: npm ci

      - name: Audit production dependencies
        run: npm run audit:prod
