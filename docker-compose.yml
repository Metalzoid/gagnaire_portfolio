# =============================================================================
# Docker Compose - PRODUCTION (Coolify)
# - Next.js standalone (frontend)
# - Express (backend)
# - Healthchecks stables
# - Aucun port exposé (Coolify gère le proxy)
# =============================================================================

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      args:
        NODE_ENV: production

    env_file:
      - .env

    environment:
      NODE_ENV: production
      PORT: 3001

    volumes:
      - uploads_data:/app/backend/uploads

    # Healthcheck : start_period 30s pour laisser prisma migrate deploy s'exécuter (Coolify)
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://localhost:3001/api/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 30s

    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      args:
        NODE_ENV: production
        NEXT_PUBLIC_API_URL: /api
        API_URL_INTERNAL: http://backend:3001

    environment:
      NODE_ENV: production
      PORT: 3000
      HOSTNAME: 0.0.0.0
      NEXT_PUBLIC_API_URL: /api
      # SSR : le frontend doit joindre le backend via le réseau Docker (pas /api relatif)
      DOCKER_ENV: "true"
      API_URL_INTERNAL: http://backend:3001

    depends_on:
      backend:
        condition: service_healthy

    # Healthcheck serré pour que Traefik route vite après un déploiement (Coolify)
    healthcheck:
      test:
        ["CMD-SHELL", "curl -fsS http://localhost:3000/api/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 3
      start_period: 15s

    restart: unless-stopped

volumes:
  uploads_data:
